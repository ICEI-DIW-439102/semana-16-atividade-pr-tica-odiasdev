<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar Filme - CineData</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <h1 class="logo">🎬 CineData</h1>
      <nav>
        <a href="index.html" class="nav-link">Filmes</a>
        <a href="cadastro_filme.html" class="nav-link active">Cadastrar Filme</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="form-section">
      <h2 id="form-titulo">Cadastrar novo filme</h2>
      <form id="form-filme" class="form-filme" novalidate>
        <div class="form-group">
          <label for="titulo">Título</label>
          <input type="text" id="titulo" name="titulo" required minlength="2" />
        </div>

        <div class="form-group">
          <label for="genero">Gênero</label>
          <select id="genero" name="genero" required>
            <option value="">Selecione...</option>
            <option value="Ação">Ação</option>
            <option value="Comédia">Comédia</option>
            <option value="Drama">Drama</option>
            <option value="Ficção Científica">Ficção Científica</option>
            <option value="Animação">Animação</option>
            <option value="Terror">Terror</option>
          </select>
        </div>

        <div class="form-group">
          <label for="nota">Nota (0 a 10)</label>
          <input type="number" id="nota" name="nota" min="0" max="10" step="0.1" required />
        </div>

        <div class="form-group">
          <label for="ano">Ano de lançamento</label>
          <input type="number" id="ano" name="ano" min="1900" max="2100" required />
        </div>

        <div class="form-group">
          <label for="duracao">Duração (min)</label>
          <input type="number" id="duracao" name="duracao" min="1" required />
        </div>

        <div class="form-group">
          <label for="imagem">URL do pôster</label>
          <input type="url" id="imagem" name="imagem" required />
        </div>

        <div class="form-group">
          <label for="sinopseCurta">Sinopse curta</label>
          <input type="text" id="sinopseCurta" name="sinopseCurta" required />
        </div>

        <div class="form-group">
          <label for="sinopseCompleta">Sinopse completa</label>
          <textarea id="sinopseCompleta" name="sinopseCompleta" rows="5" required></textarea>
        </div>

        <div class="form-group">
          <label for="tags">Tags (separadas por vírgula)</label>
          <input type="text" id="tags" name="tags" placeholder="espaço, família, tempo" />
        </div>

        <div class="form-group form-checkbox">
          <input type="checkbox" id="destaque" name="destaque" />
          <label for="destaque">Marcar como destaque</label>
        </div>

        <button type="submit" id="btn-submit" class="btn-reservar">Cadastrar filme</button>
        <p id="form-feedback" class="form-feedback"></p>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 CineData - Todos os direitos reservados</p>
  </footer>

  <script>
    const API_URL = "http://localhost:3000/filmes";
    const form = document.getElementById("form-filme");
    const feedback = document.getElementById("form-feedback");

    // Se houver ?id na URL, entramos em modo de EDIÇÃO (UPDATE via PUT)
    const params = new URLSearchParams(window.location.search);
    const editId = params.get("id");

    /**
     * READ - carrega os dados do filme para preencher o formulário (modo edição)
     */
    async function carregarParaEdicao(id) {
      try {
        const response = await fetch(`${API_URL}/${id}`);
        if (!response.ok) throw new Error("Filme não encontrado");
        const f = await response.json();

        document.getElementById("form-titulo").textContent = "Editar filme";
        document.getElementById("btn-submit").textContent = "Salvar alterações";
        document.title = "Editar Filme - CineData";

        form.titulo.value = f.titulo;
        form.genero.value = f.genero;
        form.nota.value = f.nota;
        form.ano.value = f.ano;
        form.duracao.value = f.duracao;
        form.imagem.value = f.imagem;
        form.sinopseCurta.value = f.sinopseCurta;
        form.sinopseCompleta.value = f.sinopseCompleta;
        form.tags.value = (f.tags || []).join(", ");
        form.destaque.checked = !!f.destaque;
      } catch (error) {
        feedback.textContent = "❌ Não foi possível carregar o filme para edição.";
        feedback.style.color = "var(--cor-erro)";
      }
    }

    if (editId) carregarParaEdicao(editId);

    /**
     * CREATE (POST) ou UPDATE (PUT) conforme o modo
     */
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      // Validação no front-end
      if (!form.checkValidity()) {
        feedback.textContent = "⚠️ Preencha todos os campos obrigatórios corretamente.";
        feedback.style.color = "var(--cor-erro)";
        return;
      }

      feedback.textContent = "Enviando...";
      const formData = new FormData(form);
      const filme = {
        titulo: formData.get("titulo"),
        genero: formData.get("genero"),
        nota: Number(formData.get("nota")),
        ano: Number(formData.get("ano")),
        duracao: Number(formData.get("duracao")),
        imagem: formData.get("imagem"),
        sinopseCurta: formData.get("sinopseCurta"),
        sinopseCompleta: formData.get("sinopseCompleta"),
        tags: formData.get("tags").split(",").map((t) => t.trim()).filter(Boolean),
        destaque: formData.get("destaque") === "on"
      };

      const url = editId ? `${API_URL}/${editId}` : API_URL;
      const metodo = editId ? "PUT" : "POST";

      try {
        const response = await fetch(url, {
          method: metodo,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(filme)
        });
        if (!response.ok) throw new Error("Erro na requisição");
        feedback.textContent = editId
          ? "✅ Filme atualizado com sucesso!"
          : "✅ Filme cadastrado com sucesso!";
        feedback.style.color = "var(--cor-sucesso)";
        if (!editId) form.reset();
      } catch (error) {
        feedback.textContent = "❌ Erro ao salvar o filme.";
        feedback.style.color = "var(--cor-erro)";
      }
    });
  </script>
</body>
</html>
